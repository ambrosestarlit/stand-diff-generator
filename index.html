<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>立ち絵の差分ジェネレーター</title>
  <style>
    :root {
      --bg: #f7fbf8;
      --panel: #ffffff;
      --mint: #d8eee8;
      --mint-dark: #92c9ba;
      --mint-deep: #3d7f70;
      --line: #d7e6e1;
      --text: #263633;
      --muted: #6a7f79;
      --danger: #d66b6b;
      --shadow: 0 10px 30px rgba(60, 100, 90, 0.12);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(216, 238, 232, 0.9), transparent 32rem),
        linear-gradient(135deg, #ffffff 0%, var(--bg) 50%, #eef8f5 100%);
      color: var(--text);
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
    }

    button, input, select { font: inherit; }

    button {
      border: 0;
      border-radius: 999px;
      background: var(--mint-dark);
      color: #fff;
      padding: 0.55rem 0.9rem;
      cursor: pointer;
      transition: 0.16s ease;
      white-space: nowrap;
    }

    button:hover {
      filter: brightness(0.96);
      transform: translateY(-1px);
    }

    button.secondary {
      background: #eff8f5;
      color: var(--mint-deep);
      border: 1px solid var(--line);
    }

    button.danger {
      background: #fff0f0;
      color: #b84b4b;
      border: 1px solid #f2c6c6;
    }

    button.small {
      padding: 0.35rem 0.65rem;
      font-size: 0.85rem;
    }

    input[type="text"], input[type="number"], select {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--text);
      padding: 0.5rem 0.75rem;
      outline: none;
      min-width: 0;
    }

    input[type="text"]:focus, input[type="number"]:focus, select:focus {
      border-color: var(--mint-dark);
      box-shadow: 0 0 0 3px rgba(146, 201, 186, 0.22);
    }

    input[type="file"] { display: none; }

    label {
      color: var(--muted);
      font-size: 0.88rem;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(360px, 0.8fr) minmax(560px, 1.4fr);
      gap: 1rem;
      padding: 1rem;
      height: 100vh;
    }

    .panel {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(215, 230, 225, 0.9);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(12px);
    }

    .left, .right {
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 1rem 1.1rem;
      border-bottom: 1px solid var(--line);
      background: rgba(216, 238, 232, 0.34);
    }

    .title {
      font-weight: 800;
      font-size: 1.18rem;
      letter-spacing: 0.03em;
    }

    .subtitle {
      margin-top: 0.25rem;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.45;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
      align-items: center;
      padding: 0.9rem 1rem;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
    }

    .toolbar.grouped { align-items: end; }

    .field {
      display: grid;
      gap: 0.25rem;
      min-width: 140px;
    }

    .field.wide {
      flex: 1;
      min-width: 210px;
    }

    .content-scroll {
      overflow: auto;
      padding: 1rem;
      min-height: 0;
    }

    .layer-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.92);
      margin-bottom: 0.8rem;
      overflow: hidden;
    }

    .layer-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.6rem;
      padding: 0.75rem 0.85rem;
      background: linear-gradient(90deg, rgba(216, 238, 232, 0.85), rgba(255, 255, 255, 0.8));
      border-bottom: 1px solid var(--line);
    }

    .layer-name { font-weight: 700; }

    .layer-note {
      color: var(--muted);
      font-size: 0.78rem;
      margin-top: 0.1rem;
      line-height: 1.4;
    }

    .part-list {
      display: grid;
      gap: 0.4rem;
      padding: 0.65rem;
    }

    .empty {
      color: var(--muted);
      font-size: 0.88rem;
      padding: 0.55rem 0.65rem;
      border: 1px dashed var(--line);
      border-radius: 12px;
      background: #fbfefd;
    }

    .part-row {
      display: grid;
      grid-template-columns: auto 48px 1fr auto;
      gap: 0.55rem;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 0.45rem;
      cursor: pointer;
    }

    .part-row:hover { background: #f8fffc; }

    .part-row.active {
      border-color: var(--mint-dark);
      background: #f1fbf8;
    }

    .part-row input[type="checkbox"] {
      width: 1.05rem;
      height: 1.05rem;
      accent-color: var(--mint-deep);
    }

    .part-row.diff-mode { grid-template-columns: 48px 1fr auto; }

    .thumb {
      width: 48px;
      height: 48px;
      object-fit: contain;
      border-radius: 10px;
      border: 1px solid var(--line);
      background:
        linear-gradient(45deg, #e6eee9 25%, transparent 25%),
        linear-gradient(-45deg, #e6eee9 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #e6eee9 75%),
        linear-gradient(-45deg, transparent 75%, #e6eee9 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0;
    }

    .part-meta {
      min-width: 0;
      display: grid;
      gap: 0.25rem;
    }

    .part-meta input {
      width: 100%;
      border-radius: 12px;
      padding: 0.38rem 0.5rem;
    }

    .part-size {
      color: var(--muted);
      font-size: 0.74rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .preview-wrap {
      padding: 1rem;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      flex: 1;
    }

    .preview-stage {
      position: relative;
      flex: 1;
      min-height: 320px;
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: auto;
      display: grid;
      place-items: center;
      background-color: #fff;
    }

    .preview-stage.bg-transparent {
      background-color: transparent;
      background-image:
        linear-gradient(45deg, #dfe9e5 25%, transparent 25%),
        linear-gradient(-45deg, #dfe9e5 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #dfe9e5 75%),
        linear-gradient(-45deg, transparent 75%, #dfe9e5 75%);
      background-size: 22px 22px;
      background-position: 0 0, 0 11px, 11px -11px, -11px 0;
    }

    .preview-stage.bg-white { background: #fff; }
    .preview-stage.bg-mint { background: #e4f3ee; }

    #previewCanvas {
      max-width: 86%;
      max-height: 86%;
      object-fit: contain;
      transform-origin: center center;
      transition: transform 0.05s linear;
      image-rendering: auto;
    }

    .preview-info {
      position: absolute;
      top: 0.7rem;
      left: 0.7rem;
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid var(--line);
      color: var(--muted);
      border-radius: 999px;
      padding: 0.35rem 0.65rem;
      font-size: 0.78rem;
      pointer-events: none;
    }

    .slider-grid {
      display: grid;
      gap: 0.6rem;
      padding: 0.75rem;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.86);
    }

    .slider-row {
      display: grid;
      grid-template-columns: 86px 1fr 70px;
      align-items: center;
      gap: 0.65rem;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--mint-deep);
    }

    .value {
      text-align: right;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      font-size: 0.85rem;
    }

    .status {
      color: var(--muted);
      font-size: 0.82rem;
      min-height: 1.2em;
    }

    .hint {
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.5;
    }

    .danger-text { color: var(--danger); }
    .hidden { display: none !important; }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
        height: auto;
      }
      .right { min-height: 720px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel left">
      <div class="header">
        <div class="title" data-i18n="appTitle">立ち絵の差分ジェネレーター</div>
        <div class="subtitle" data-i18n="appSubtitle">カテゴリごとに画像を登録し、チェックしたパーツを重ねて透過PNGを書き出します。</div>
      </div>

      <div class="toolbar grouped">
        <div class="field">
          <label for="languageSelect" data-i18n="languageLabel">Language</label>
          <select id="languageSelect">
            <option value="ja">日本語</option>
            <option value="en">English</option>
            <option value="ko">한국어</option>
          </select>
        </div>
        <div class="field wide">
          <label for="leftModeSelect" data-i18n="leftPanelLabel">左パネル表示</label>
          <select id="leftModeSelect">
            <option value="parts" data-i18n="modeParts">パーツ組みモード</option>
            <option value="diff" data-i18n="modeDiff">差分切り替えモード</option>
          </select>
        </div>
      </div>

      <div class="toolbar grouped">
        <div class="field wide">
          <label for="characterSelect" data-i18n="characterLabel">キャラクター</label>
          <select id="characterSelect"></select>
        </div>
        <div class="field wide">
          <label for="characterNameInput" data-i18n="characterNameLabel">キャラクター名</label>
          <input id="characterNameInput" type="text" placeholder="キャラクター名" data-i18n-placeholder="characterNamePlaceholder" />
        </div>
        <button id="addCharacterBtn" data-i18n="addButton">追加</button>
        <button id="renameCharacterBtn" class="secondary" data-i18n="renameButton">名前変更</button>
        <button id="deleteCharacterBtn" class="danger" data-i18n="deleteButton">削除</button>
      </div>

      <div id="presetToolbar" class="toolbar grouped">
        <div class="field wide">
          <label for="presetSelect" data-i18n="presetLabel">プリセット</label>
          <select id="presetSelect"></select>
        </div>
        <div class="field wide">
          <label for="presetNameInput" data-i18n="presetNameLabel">プリセット名</label>
          <input id="presetNameInput" type="text" placeholder="例：通常笑顔 / 照れ / 怒り" data-i18n-placeholder="presetNamePlaceholder" />
        </div>
        <button id="savePresetBtn" data-i18n="savePresetButton">現在の組み合わせを保存</button>
        <button id="applyPresetBtn" class="secondary" data-i18n="applyButton">適用</button>
        <button id="deletePresetBtn" class="danger" data-i18n="deleteButton">削除</button>
      </div>

      <div id="layersRoot" class="content-scroll"></div>
    </section>

    <section class="panel right">
      <div class="header">
        <div class="title" data-i18n="previewTitle">プレビュー / 書き出し</div>
        <div class="subtitle" data-i18n="previewSubtitle">スケール・X移動・Y移動は確認用です。PNG書き出しには反映されません。</div>
      </div>

      <div class="toolbar grouped">
        <div class="field">
          <label for="previewBgSelect" data-i18n="previewBgLabel">プレビュー背景</label>
          <select id="previewBgSelect">
            <option value="transparent" data-i18n="bgTransparent">透明確認</option>
            <option value="white" data-i18n="bgWhite">白</option>
            <option value="mint" data-i18n="bgMint">くすみミント</option>
          </select>
        </div>

        <div class="field">
          <label for="exportHeightInput" data-i18n="exportHeightLabel">書き出し縦幅(px)</label>
          <input id="exportHeightInput" type="number" min="1" step="1" value="1200" />
        </div>

        <div class="field">
          <label for="exportOriginalSelect" data-i18n="sizeLabel">サイズ</label>
          <select id="exportOriginalSelect">
            <option value="original" data-i18n="sizeOriginal">原寸</option>
            <option value="height" data-i18n="sizeHeight">縦幅指定</option>
          </select>
        </div>

        <button id="exportPngBtn" data-i18n="exportPngButton">透過PNG書き出し</button>
      </div>

      <div class="toolbar">
        <button id="downloadJsonBtn" data-i18n="jsonSaveButton">JSON保存</button>
        <button id="importJsonBtn" class="secondary" data-i18n="jsonLoadButton">JSON読込</button>
        <button id="saveCacheBtn" data-i18n="cacheSaveButton">キャッシュ保存</button>
        <button id="loadCacheBtn" class="secondary" data-i18n="cacheLoadButton">キャッシュ読込</button>
        <button id="clearCacheBtn" class="danger" data-i18n="cacheDeleteButton">キャッシュ削除</button>
        <input id="jsonFileInput" type="file" accept="application/json,.json" />
      </div>

      <div class="preview-wrap">
        <div id="previewStage" class="preview-stage bg-transparent">
          <div id="previewInfo" class="preview-info">0 × 0</div>
          <canvas id="previewCanvas"></canvas>
        </div>

        <div class="slider-grid">
          <div class="slider-row">
            <label for="previewScale" data-i18n="scaleLabel">スケール</label>
            <input id="previewScale" type="range" min="0.2" max="3" step="0.01" value="1" />
            <div id="previewScaleValue" class="value">1.00</div>
          </div>

          <div class="slider-row">
            <label for="previewX" data-i18n="xMoveLabel">X移動</label>
            <input id="previewX" type="range" min="-500" max="500" step="1" value="0" />
            <div id="previewXValue" class="value">0px</div>
          </div>

          <div class="slider-row">
            <label for="previewY" data-i18n="yMoveLabel">Y移動</label>
            <input id="previewY" type="range" min="-500" max="500" step="1" value="0" />
            <div id="previewYValue" class="value">0px</div>
          </div>
        </div>

        <div id="status" class="status"></div>
        <div class="hint" data-i18n="hintText">重ね順は画面上のカテゴリ順を最前面として扱います。書き出し時は奥側から順に描画されるため、透明PNGのパーツ画像は同じキャンバスサイズで作ると綺麗に合成できます。</div>
      </div>
    </section>
  </main>

        switchedParts: "파츠 조합 모드로 변경했습니다.",
        enterCharacterName: "캐릭터 이름을 입력해 주세요.",
        characterAdded: "캐릭터를 추가했습니다.",
        characterRenamed: "캐릭터 이름을 변경했습니다.",
        cannotDeleteLastCharacter: "마지막 캐릭터는 삭제할 수 없습니다.",
        deleteCharacterConfirm: "현재 캐릭터를 삭제할까요?",
        characterDeleted: "캐릭터를 삭제했습니다.",
        enterPresetName: "프리셋 이름을 입력해 주세요.",
        presetSaved: "프리셋을 저장했습니다.",
        selectPresetDelete: "삭제할 프리셋을 선택해 주세요.",
        presetDeleted: "프리셋을 삭제했습니다.",
        presetApplied: "프리셋 \"{name}\"을 적용했습니다."

    };

    const LAYERS = [
      { id: "armFront" },
      { id: "itemFront" },
      { id: "hairFront" },
      { id: "eyes" },
      { id: "brows" },
      { id: "mouth" },
      { id: "effect" },
      { id: "armBack" },
      { id: "itemMiddle" },
      { id: "base" },
      { id: "itemBack" },
      { id: "hairBack" }
    ];

    const DIFF_LAYERS = [{ id: "diffBase" }];
    const DB_NAME = "stand-diff-generator-db";
    const DB_VERSION = 1;
    const STORE_NAME = "projects";
    const CACHE_KEY = "current-project";
    const LANG_STORAGE_KEY = "stand-diff-generator-language";

    const $ = (selector) => document.querySelector(selector);
    const uid = () => `${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 10)}`;
    const imageCache = new Map();
    let previewRenderToken = 0;
    let state = createDefaultState();

    function getInitialLanguage() {
      const stored = localStorage.getItem(LANG_STORAGE_KEY);
      if (stored && I18N[stored]) return stored;
      const browser = (navigator.language || "ja").toLowerCase();
      if (browser.startsWith("ko")) return "ko";
      if (browser.startsWith("en")) return "en";
      return "ja";
    }

    function currentLanguage() {
      return I18N[state.settings?.uiLanguage] ? state.settings.uiLanguage : getInitialLanguage();
    }

    function t(key, vars = {}) {
      const lang = currentLanguage();
      let text = I18N[lang]?.[key] ?? I18N.ja[key] ?? key;
      for (const [name, value] of Object.entries(vars)) {
        text = text.replaceAll(`{${name}}`, String(value));
      }
      return text;
    }

    function applyLanguage() {
      const lang = currentLanguage();
      document.documentElement.lang = lang;
      document.title = t("appTitle");
      localStorage.setItem(LANG_STORAGE_KEY, lang);

      document.querySelectorAll("[data-i18n]").forEach((element) => {
        element.textContent = t(element.dataset.i18n);
      });

      document.querySelectorAll("[data-i18n-placeholder]").forEach((element) => {
        element.placeholder = t(element.dataset.i18nPlaceholder);
      });

      const languageSelect = $("#languageSelect");
      if (languageSelect) languageSelect.value = lang;
    }

    function createDefaultState() {
      const firstChar = createCharacter(I18N[getInitialLanguage()].newCharacter);
      return {
        version: 2,
        activeCharacterId: firstChar.id,
        characters: [firstChar],
        settings: {
          uiLanguage: getInitialLanguage(),
          leftMode: "parts",
          previewBg: "transparent",
          previewScale: 1,
          previewX: 0,
          previewY: 0,
          exportMode: "original",
          exportHeight: 1200
        }
      };
    }

    function createCharacter(name) {
      const layers = {};
      const diffLayers = {};
      for (const layer of LAYERS) layers[layer.id] = [];
      for (const layer of DIFF_LAYERS) diffLayers[layer.id] = [];
      return { id: uid(), name, layers, diffLayers, presets: [] };
    }

    function normalizePartList(parts) {
      if (!Array.isArray(parts)) return [];
      return parts.map((part) => ({
        id: part.id || uid(),
        name: part.name || t("unnamed"),
        dataUrl: part.dataUrl || part.dataURL || "",
        width: Number(part.width || part.w || 0),
        height: Number(part.height || part.h || 0),
        selected: Boolean(part.selected)
      })).filter((part) => part.dataUrl);
    }

    function normalizeState(project) {
      const normalized = project && typeof project === "object" ? project : createDefaultState();
      const existingLanguage = normalized.settings?.uiLanguage || localStorage.getItem(LANG_STORAGE_KEY) || getInitialLanguage();

      if (!Array.isArray(normalized.characters) || normalized.characters.length === 0) {
        normalized.characters = [createCharacter(t("newCharacter"))];
      }

      normalized.settings = {
        uiLanguage: I18N[existingLanguage] ? existingLanguage : getInitialLanguage(),
        leftMode: normalized.settings?.leftMode === "diff" ? "diff" : "parts",
        previewBg: normalized.settings?.previewBg || "transparent",
        previewScale: Number(normalized.settings?.previewScale ?? 1),
        previewX: Number(normalized.settings?.previewX ?? 0),
        previewY: Number(normalized.settings?.previewY ?? 0),
        exportMode: normalized.settings?.exportMode || "original",
        exportHeight: Number(normalized.settings?.exportHeight ?? 1200)
      };

      for (const character of normalized.characters) {
        if (!character.id) character.id = uid();
        if (!character.name) character.name = t("unnamed");
        if (!character.layers || typeof character.layers !== "object") character.layers = {};
        if (!character.diffLayers || typeof character.diffLayers !== "object") character.diffLayers = {};
        if (!Array.isArray(character.presets)) character.presets = [];

        for (const layer of LAYERS) {
          character.layers[layer.id] = normalizePartList(character.layers[layer.id]);
        }

        for (const layer of DIFF_LAYERS) {
          character.diffLayers[layer.id] = normalizePartList(character.diffLayers[layer.id]);
          const selectedIndex = character.diffLayers[layer.id].findIndex((part) => part.selected);
          if (selectedIndex >= 0) {
            character.diffLayers[layer.id].forEach((part, index) => {
              part.selected = index === selectedIndex;
            });
          }
        }

        character.presets = character.presets.map((preset) => ({
          id: preset.id || uid(),
          name: preset.name || t("unnamed"),
          selection: preset.selection && typeof preset.selection === "object" ? preset.selection : {}
        }));
      }

      if (!normalized.activeCharacterId || !normalized.characters.some((c) => c.id === normalized.activeCharacterId)) {
        normalized.activeCharacterId = normalized.characters[0].id;
      }

      return normalized;
    }

    function activeCharacter() {
      return state.characters.find((character) => character.id === state.activeCharacterId) || state.characters[0];
    }

    function getActiveMode() {
      return state.settings?.leftMode === "diff" ? "diff" : "parts";
    }

    function getActiveLayers() {
      return getActiveMode() === "diff" ? DIFF_LAYERS : LAYERS;
    }

    function getLayerStore(character = activeCharacter()) {
      return getActiveMode() === "diff" ? character.diffLayers : character.layers;
    }

    function getCanvasBaseSize(character = activeCharacter()) {
      let width = 0;
      let height = 0;
      const layers = getActiveLayers();
      const store = getLayerStore(character);

      for (const layer of layers) {
        for (const part of store[layer.id] || []) {
          if (part.selected || width === 0 || height === 0) {
            width = Math.max(width, Number(part.width || 0));
            height = Math.max(height, Number(part.height || 0));
          }
        }
      }

      if (!width || !height) return { width: 1200, height: 1200 };
      return { width, height };
    }

    function setStatus(text, isDanger = false) {
      const status = $("#status");
      status.textContent = text;
      status.classList.toggle("danger-text", isDanger);
    }

    function setStatusT(key, vars = {}, isDanger = false) {
      setStatus(t(key, vars), isDanger);
    }

    function renderAll() {
      renderCharacterControls();
      renderPresetControls();
      renderLayers();
      syncSettingsControls();
      updatePreviewTransform();
      renderPreview();
      applyLanguage();
    }

    function renderCharacterControls() {
      const select = $("#characterSelect");
      select.innerHTML = "";
      for (const character of state.characters) {
        const option = document.createElement("option");
        option.value = character.id;
        option.textContent = character.name;
        option.selected = character.id === state.activeCharacterId;
        select.appendChild(option);
      }
      $("#characterNameInput").value = activeCharacter().name;
    }

    function renderPresetControls() {
      const toolbar = $("#presetToolbar");
      if (toolbar) toolbar.classList.toggle("hidden", getActiveMode() === "diff");

      const character = activeCharacter();
      const select = $("#presetSelect");
      select.innerHTML = "";

      const emptyOption = document.createElement("option");
      emptyOption.value = "";
      emptyOption.textContent = t("presetEmpty");
      select.appendChild(emptyOption);

      for (const preset of character.presets) {
        const option = document.createElement("option");
        option.value = preset.id;
        option.textContent = preset.name;
        select.appendChild(option);
      }
    }

    function renderLayers() {
      const root = $("#layersRoot");
      root.innerHTML = "";
      const character = activeCharacter();
      const mode = getActiveMode();
      const layers = getActiveLayers();
      const store = getLayerStore(character);

      for (const layer of layers) {
        const card = document.createElement("section");
        card.className = "layer-card";

        const head = document.createElement("div");
        head.className = "layer-head";

        const titleWrap = document.createElement("div");
        const name = document.createElement("div");
        name.className = "layer-name";
        name.textContent = t(`layer_${layer.id}`);

        const note = document.createElement("div");
        note.className = "layer-note";
        note.textContent = mode === "diff" ? t("noteDiff") : t("noteParts");
        titleWrap.append(name, note);

        const uploadBtn = document.createElement("button");
        uploadBtn.className = "small";
        uploadBtn.textContent = t("registerImage");

        const fileInput = document.createElement("input");
        fileInput.type = "file";
        fileInput.accept = "image/png,image/jpeg,image/webp";
        fileInput.multiple = true;

        uploadBtn.addEventListener("click", () => fileInput.click());
        fileInput.addEventListener("change", async (event) => {
          await addImagesToLayer(layer.id, Array.from(event.target.files || []));
          fileInput.value = "";
        });

        head.append(titleWrap, uploadBtn, fileInput);

        const list = document.createElement("div");
        list.className = "part-list";
        const parts = store[layer.id] || [];

        if (parts.length === 0) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = mode === "diff" ? t("emptyDiff") : t("emptyParts");
          list.appendChild(empty);
        } else {
          for (const part of parts) {
            const row = document.createElement("div");
            row.className = `part-row${part.selected ? " active" : ""}${mode === "diff" ? " diff-mode" : ""}`;

            const img = document.createElement("img");
            img.className = "thumb";
            img.src = part.dataUrl;
            img.alt = part.name;

            const meta = document.createElement("div");
            meta.className = "part-meta";

            const nameInput = document.createElement("input");
            nameInput.type = "text";
            nameInput.value = part.name;
            nameInput.placeholder = t("partNamePlaceholder");
            nameInput.addEventListener("input", () => {
              part.name = nameInput.value.trim() || t("unnamed");
            });

            const size = document.createElement("div");
            size.className = "part-size";
            size.textContent = `${part.width || "-"} × ${part.height || "-"} px${part.selected ? ` / ${t("displaying")}` : ""}`;
            meta.append(nameInput, size);

            const removeBtn = document.createElement("button");
            removeBtn.className = "small danger";
            removeBtn.textContent = t("deleteButton");

            if (mode === "parts") {
              const checkbox = document.createElement("input");
              checkbox.type = "checkbox";
              checkbox.checked = part.selected;
              checkbox.title = t("applyDisplay");

              const toggle = () => {
                part.selected = !part.selected;
                renderLayers();
                renderPreview();
              };

              row.addEventListener("click", (event) => {
                const tag = event.target.tagName.toLowerCase();
                if (tag === "input" || tag === "button") return;
                toggle();
              });

              checkbox.addEventListener("change", () => {
                part.selected = checkbox.checked;
                renderLayers();
                renderPreview();
              });

              row.append(checkbox, img, meta, removeBtn);
            } else {
              row.addEventListener("click", (event) => {
                const tag = event.target.tagName.toLowerCase();
                if (tag === "input" || tag === "button") return;
                for (const item of parts) item.selected = false;
                part.selected = true;
                renderLayers();
                renderPreview();
              });
              row.append(img, meta, removeBtn);
            }

            removeBtn.addEventListener("click", () => {
              store[layer.id] = parts.filter((item) => item.id !== part.id);
              imageCache.delete(part.dataUrl);
              renderLayers();
              renderPreview();
            });

            list.appendChild(row);
          }
        }

        card.append(head, list);
        root.appendChild(card);
      }
    }

    function syncSettingsControls() {
      $("#languageSelect").value = currentLanguage();
      $("#leftModeSelect").value = getActiveMode();
      $("#previewBgSelect").value = state.settings.previewBg;
      $("#previewScale").value = state.settings.previewScale;
      $("#previewX").value = state.settings.previewX;
      $("#previewY").value = state.settings.previewY;
      $("#exportOriginalSelect").value = state.settings.exportMode;
      $("#exportHeightInput").value = state.settings.exportHeight;
    }

    function updatePreviewTransform() {
      const scale = Number(state.settings.previewScale || 1);
      const x = Number(state.settings.previewX || 0);
      const y = Number(state.settings.previewY || 0);
      $("#previewCanvas").style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
      $("#previewScaleValue").textContent = scale.toFixed(2);
      $("#previewXValue").textContent = `${x}px`;
      $("#previewYValue").textContent = `${y}px`;

      const stage = $("#previewStage");
      stage.classList.remove("bg-transparent", "bg-white", "bg-mint");
      stage.classList.add(`bg-${state.settings.previewBg}`);
    }

    async function addImagesToLayer(layerId, files) {
      if (!files.length) return;
      const mode = getActiveMode();
      const store = getLayerStore(activeCharacter());
      let addedCount = 0;

      for (const file of files) {
        if (!file.type.startsWith("image/")) continue;
        const dataUrl = await fileToDataUrl(file);
        const size = await getImageSize(dataUrl);
        const shouldSelect = mode === "diff" && store[layerId].length === 0 && addedCount === 0;
        store[layerId].push({
          id: uid(),
          name: file.name.replace(/\.[^.]+$/, ""),
          dataUrl,
          width: size.width,
          height: size.height,
          selected: shouldSelect
        });
        addedCount++;
      }

      renderLayers();
      renderPreview();
      setStatusT("addedImages", { count: addedCount });
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result));
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function getImageSize(dataUrl) {
      return loadImage(dataUrl).then((img) => ({ width: img.naturalWidth, height: img.naturalHeight }));
    }

    function loadImage(dataUrl) {
      if (imageCache.has(dataUrl)) return Promise.resolve(imageCache.get(dataUrl));
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          imageCache.set(dataUrl, img);
          resolve(img);
        };
        img.onerror = reject;
        img.src = dataUrl;
      });
    }

    async function renderPreview() {
      const token = ++previewRenderToken;
      const character = activeCharacter();
      const { width, height } = getCanvasBaseSize(character);
      const canvas = $("#previewCanvas");
      canvas.width = width;
      canvas.height = height;
      await drawComposite(canvas, width, height, character);
      if (token !== previewRenderToken) return;
      $("#previewInfo").textContent = `${width} × ${height}`;
    }

    async function drawComposite(canvas, width, height, character = activeCharacter()) {
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, width, height);
      const drawLayers = [...getActiveLayers()].reverse();
      const store = getLayerStore(character);
      for (const layer of drawLayers) {
        const parts = (store[layer.id] || []).filter((part) => part.selected);
        for (const part of parts) {
          const img = await loadImage(part.dataUrl);
          ctx.drawImage(img, 0, 0, width, height);
        }
      }
    }

    function createSelectionSnapshot(character = activeCharacter()) {
      const selection = {};
      for (const layer of LAYERS) {
        selection[layer.id] = character.layers[layer.id]
          .filter((part) => part.selected)
          .map((part) => part.id);
      }
      return selection;
    }

    function applySelectionSnapshot(selection, character = activeCharacter()) {
      for (const layer of LAYERS) {
        const selectedIds = new Set(Array.isArray(selection?.[layer.id]) ? selection[layer.id] : []);
        for (const part of character.layers[layer.id]) {
          part.selected = selectedIds.has(part.id);
        }
      }
    }

    async function exportPng() {
      const character = activeCharacter();
      const base = getCanvasBaseSize(character);
      let outWidth = base.width;
      let outHeight = base.height;

      if (state.settings.exportMode === "height") {
        const desiredHeight = Math.max(1, Math.floor(Number(state.settings.exportHeight || base.height)));
        const ratio = desiredHeight / base.height;
        outHeight = desiredHeight;
        outWidth = Math.max(1, Math.round(base.width * ratio));
      }

      const canvas = document.createElement("canvas");
      canvas.width = outWidth;
      canvas.height = outHeight;
      await drawComposite(canvas, outWidth, outHeight, character);

      const link = document.createElement("a");
      const safeName = sanitizeFileName(character.name || "character");
      link.download = `${safeName}_${formatDateForFile()}_${outWidth}x${outHeight}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
      setStatusT("pngExported", { width: outWidth, height: outHeight });
    }

    function sanitizeFileName(name) {
      return String(name)
        .replace(/[\\/:*?"<>|]/g, "_")
        .replace(/\s+/g, "_")
        .slice(0, 80) || "character";
    }

    function formatDateForFile() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      const h = String(d.getHours()).padStart(2, "0");
      const min = String(d.getMinutes()).padStart(2, "0");
      return `${y}${m}${day}_${h}${min}`;
    }

    function downloadJson() {
      const json = JSON.stringify(state, null, 2);
      const blob = new Blob([json], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.download = `stand_diff_project_${formatDateForFile()}.json`;
      link.href = url;
      link.click();
      URL.revokeObjectURL(url);
      setStatusT("jsonSaved");
    }

    async function importJsonFile(file) {
      try {
        const text = await file.text();
        const project = JSON.parse(text);
        state = normalizeState(project);
        imageCache.clear();
        renderAll();
        setStatusT("jsonLoaded");
      } catch (error) {
        console.error(error);
        setStatusT("jsonLoadFailed", {}, true);
      }
    }

    function openDb() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = () => {
          const db = request.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME, { keyPath: "key" });
          }
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function saveToCache() {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readwrite");
        tx.objectStore(STORE_NAME).put({ key: CACHE_KEY, updatedAt: new Date().toISOString(), project: state });
        tx.oncomplete = () => { db.close(); resolve(); };
        tx.onerror = () => { db.close(); reject(tx.error); };
      });
    }

    async function loadFromCache() {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readonly");
        const request = tx.objectStore(STORE_NAME).get(CACHE_KEY);
        request.onsuccess = () => { db.close(); resolve(request.result?.project || null); };
        request.onerror = () => { db.close(); reject(request.error); };
      });
    }

    async function clearCache() {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readwrite");
        tx.objectStore(STORE_NAME).delete(CACHE_KEY);
        tx.oncomplete = () => { db.close(); resolve(); };
        tx.onerror = () => { db.close(); reject(tx.error); };
      });
    }

    function bindEvents() {
      $("#languageSelect").addEventListener("change", (event) => {
        state.settings.uiLanguage = event.target.value;
        localStorage.setItem(LANG_STORAGE_KEY, state.settings.uiLanguage);
        renderAll();
        setStatusT("languageChanged");
      });

      $("#leftModeSelect").addEventListener("change", (event) => {
        state.settings.leftMode = event.target.value === "diff" ? "diff" : "parts";
        renderAll();
        setStatusT(state.settings.leftMode === "diff" ? "switchedDiff" : "switchedParts");
      });

      $("#characterSelect").addEventListener("change", (event) => {
        state.activeCharacterId = event.target.value;
        renderAll();
      });

      $("#addCharacterBtn").addEventListener("click", () => {
        const name = $("#characterNameInput").value.trim();
        if (!name) { setStatusT("enterCharacterName", {}, true); return; }
        const character = createCharacter(name);
        state.characters.push(character);
        state.activeCharacterId = character.id;
        renderAll();
        setStatusT("characterAdded");
      });

      $("#renameCharacterBtn").addEventListener("click", () => {
        const name = $("#characterNameInput").value.trim();
        if (!name) { setStatusT("enterCharacterName", {}, true); return; }
        activeCharacter().name = name;
        renderCharacterControls();
        setStatusT("characterRenamed");
      });

      $("#deleteCharacterBtn").addEventListener("click", () => {
        if (state.characters.length <= 1) { setStatusT("cannotDeleteLastCharacter", {}, true); return; }
        if (!confirm(t("deleteCharacterConfirm"))) return;
        const id = state.activeCharacterId;
        state.characters = state.characters.filter((character) => character.id !== id);
        state.activeCharacterId = state.characters[0].id;
        imageCache.clear();
        renderAll();
        setStatusT("characterDeleted");
      });

      $("#savePresetBtn").addEventListener("click", () => {
        const name = $("#presetNameInput").value.trim();
        if (!name) { setStatusT("enterPresetName", {}, true); return; }
        const character = activeCharacter();
        character.presets.push({ id: uid(), name, selection: createSelectionSnapshot(character) });
        $("#presetNameInput").value = "";
        renderPresetControls();
        setStatusT("presetSaved");
      });

      $("#applyPresetBtn").addEventListener("click", applySelectedPreset);
      $("#presetSelect").addEventListener("change", applySelectedPreset);

      $("#deletePresetBtn").addEventListener("click", () => {
        const character = activeCharacter();
        const presetId = $("#presetSelect").value;
        if (!presetId) { setStatusT("selectPresetDelete", {}, true); return; }
        character.presets = character.presets.filter((preset) => preset.id !== presetId);
        renderPresetControls();
        setStatusT("presetDeleted");
      });

      $("#previewBgSelect").addEventListener("change", (event) => {
        state.settings.previewBg = event.target.value;
        updatePreviewTransform();
      });

      $("#previewScale").addEventListener("input", (event) => {
        state.settings.previewScale = Number(event.target.value);
        updatePreviewTransform();
      });

      $("#previewX").addEventListener("input", (event) => {
        state.settings.previewX = Number(event.target.value);
        updatePreviewTransform();
      });

      $("#previewY").addEventListener("input", (event) => {
        state.settings.previewY = Number(event.target.value);
        updatePreviewTransform();
      });

      $("#exportOriginalSelect").addEventListener("change", (event) => {
        state.settings.exportMode = event.target.value;
      });

      $("#exportHeightInput").addEventListener("input", (event) => {
        state.settings.exportHeight = Number(event.target.value || 1200);
      });

      $("#exportPngBtn").addEventListener("click", () => {
        exportPng().catch((error) => {
          console.error(error);
          setStatusT("pngExportFailed", {}, true);
        });
      });

      $("#downloadJsonBtn").addEventListener("click", downloadJson);
      $("#importJsonBtn").addEventListener("click", () => $("#jsonFileInput").click());

      $("#jsonFileInput").addEventListener("change", async (event) => {
        const file = event.target.files?.[0];
        if (file) await importJsonFile(file);
        event.target.value = "";
      });

      $("#saveCacheBtn").addEventListener("click", async () => {
        try { await saveToCache(); setStatusT("cacheSaved"); }
        catch (error) { console.error(error); setStatusT("cacheSaveFailed", {}, true); }
      });

      $("#loadCacheBtn").addEventListener("click", async () => {
        try {
          const cached = await loadFromCache();
          if (!cached) { setStatusT("cacheMissing", {}, true); return; }
          state = normalizeState(cached);
          imageCache.clear();
          renderAll();
          setStatusT("cacheLoaded");
        } catch (error) {
          console.error(error);
          setStatusT("cacheLoadFailed", {}, true);
        }
      });

      $("#clearCacheBtn").addEventListener("click", async () => {
        if (!confirm(t("cacheDeleteConfirm"))) return;
        try { await clearCache(); setStatusT("cacheDeleted"); }
        catch (error) { console.error(error); setStatusT("cacheDeleteFailed", {}, true); }
      });
    }

    function applySelectedPreset() {
      const character = activeCharacter();
      const presetId = $("#presetSelect").value;
      if (!presetId) return;
      const preset = character.presets.find((item) => item.id === presetId);
      if (!preset) return;
      applySelectionSnapshot(preset.selection, character);
      renderLayers();
      renderPreview();
      setStatusT("presetApplied", { name: preset.name });
    }

    async function tryAutoLoadCache() {
      try {
        const cached = await loadFromCache();
        if (cached) {
          const currentLang = state.settings.uiLanguage;
          state = normalizeState(cached);
          state.settings.uiLanguage = currentLang;
          imageCache.clear();
          renderAll();
          setStatusT("cacheAutoLoaded");
        }
      } catch (error) {
        console.warn("cache auto load skipped:", error);
      }
    }

    bindEvents();
    state = normalizeState(state);
    renderAll();
    tryAutoLoadCache();
  </script>
</body>
</html>
